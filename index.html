<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StateGen</title>
  <link rel="stylesheet" href="src/css/theme.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <link rel="stylesheet" href="src/css/toolbar.css">
  <link rel="stylesheet" href="src/css/zoom-toolbar.css">
  <link rel="stylesheet" href="src/css/choice-node.css">
  <link rel="stylesheet" href="src/css/connectors.css">
  <link rel="stylesheet" href="src/css/minimap.css">
  <link rel="stylesheet" href="src/css/inspector.css">
  <link rel="stylesheet" href="src/css/left-panel.css">
  <link rel="stylesheet" href="src/css/settings.css">
</head>
<body>

  <!-- ── Top Toolbar (Run + file ops + theme) ────────────────────────────── -->
  <div id="toolbar">
    <button id="btn-run" class="toolbar-btn run-btn" title="Run the state machines">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <polygon points="2,1 12,7 2,13" fill="currentColor"/>
      </svg>
      Run
    </button>

    <div class="toolbar-sep"></div>

    <button id="btn-export-json" class="toolbar-btn" title="Export diagram as JSON">Export JSON</button>
    <button id="btn-load-json" class="toolbar-btn" title="Load diagram from JSON">Load JSON</button>
    <button id="btn-load-example" class="toolbar-btn" title="Load an example project">Load Example</button>
    <button id="btn-build" class="toolbar-btn" title="Build runnable ZIP">Build</button>

    <div style="flex:1"></div>
    <button id="btn-theme-toggle" class="toolbar-btn" title="Toggle light/dark theme">&#9788; Light</button>
  </div>

  <!-- ── Main area (left panel + canvas + divider + inspector) ────────── -->
  <div id="main-area">

    <!-- ── Data panel (objects / classes / enums) ────────────────────────── -->
    <div id="left-panel">
      <div id="data-panel-title" class="left-panel-title">Data</div>
      <div id="section-objects" class="left-panel-section">
        <div class="left-panel-header" id="objects-header">
          <span>Objects</span>
          <button id="btn-add-object" class="left-panel-add-btn" title="Add object">+</button>
        </div>
        <div id="objects-list" class="left-panel-list"></div>
      </div>
      <div id="section-object-props" class="left-panel-section" style="display:none;">
        <div class="left-panel-header">
          <span id="object-props-title">Properties</span>
        </div>
        <div id="object-props-list" class="left-panel-list"></div>
      </div>
      <div id="section-classes" class="left-panel-section">
        <div class="left-panel-header" id="classes-header">
          <span>Classes</span>
          <button id="btn-add-class" class="left-panel-add-btn" title="Add class">+</button>
        </div>
        <div id="classes-list" class="left-panel-list"></div>
      </div>
      <div id="section-enums" class="left-panel-section">
        <div class="left-panel-header" id="enums-header">
          <span>Enum Classes</span>
          <button id="btn-add-enum" class="left-panel-add-btn" title="Add enum class">+</button>
        </div>
        <div id="enums-list" class="left-panel-list"></div>
      </div>
      <div id="btn-edit-classes" class="left-panel-mode-btn" title="Switch to Class / Enum editing mode">Edit Classes &amp; Enums</div>
    </div>
    <div id="divider-left"></div>

    <div id="canvas-container">
      <div id="canvas">
        <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="canvas-no-object" style="display:none;">Select an object or class to view its state chart</div>
      <div id="runtime-stage" style="display:none;"></div>

      <!-- ── State tools (top-left of canvas) ──────────────────────────── -->
      <div id="state-toolbar">
        <button id="btn-new-state" class="toolbar-btn palette-btn" draggable="false"
                title="Drag onto canvas to create a new State node">
          <span class="palette-icon-state" aria-hidden="true"></span>
          State
        </button>
        <button id="btn-new-start" class="toolbar-btn palette-btn" draggable="false"
                title="Drag onto canvas to create a Start state">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <circle cx="7" cy="7" r="5.5" fill="currentColor"/>
          </svg>
          Start
        </button>
        <button id="btn-new-end" class="toolbar-btn palette-btn" draggable="false"
                title="Drag onto canvas to create an End state">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="7" cy="7" r="3"   fill="currentColor"/>
          </svg>
          End
        </button>
        <button id="btn-new-terminate" class="toolbar-btn palette-btn" draggable="false"
                title="Drag onto canvas to create a Terminate state">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Terminate
        </button>
        <button id="btn-new-choice" class="toolbar-btn palette-btn" draggable="false"
                title="Drag onto canvas to create a Choice (diamond) node">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <polygon points="7,1 13,7 7,13 1,7" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Choice
        </button>
      </div>

      <!-- ── Zoom toolbar (top-right of canvas) ──────────────────────────── -->
      <div id="zoom-toolbar">
        <button id="btn-fit-all" class="toolbar-btn" title="Fit All – zoom to show all diagram elements (F)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3"  y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <div class="toolbar-sep"></div>
        <button id="btn-zoom-out" class="toolbar-btn" title="Zoom Out (-)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <input id="zoom-slider" type="range" min="8" max="500" value="100" title="Zoom slider">
        <button id="btn-zoom-in" class="toolbar-btn" title="Zoom In (= or +)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <div class="toolbar-sep"></div>
        <button id="btn-hand-tool" class="toolbar-btn tool-btn" title="Hand Tool – pan canvas (H or middle-mouse drag)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v1M10 5V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
            <path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
          </svg>
        </button>
      </div>

      <!-- ── Minimap ─────────────────────────────────────────────────────── -->
      <div id="minimap" title="Minimap – drag the red rectangle to scroll the canvas">
        <div id="minimap-states"></div>
        <div id="minimap-viewport"></div>
        <span id="minimap-label">MAP</span>
        <button id="minimap-minimize" title="Minimize minimap">_</button>
      </div>
      <button id="minimap-restore" title="Show minimap">Minimap</button>
    </div>

    <div id="divider"></div>

    <div id="inspector">
      <div id="inspector-tabs">
        <button class="inspector-tab active" data-tab="inspector">Inspector</button>
      </div>

      <!-- Inspector panel -->
      <div id="inspector-panel" class="tab-panel">
        <div id="inspector-body">
          <p id="inspector-empty">No object selected</p>
          <div id="inspector-props" style="display:none;">
            <table id="inspector-table">
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Modal for new object/class/enum ──────────────────────────────────── -->
  <div id="modal-overlay" style="display:none;">
    <div id="modal-dialog">
      <div id="modal-header"><span id="modal-title">New Item</span><button id="modal-close" class="json-modal-btn">&times;</button></div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button id="modal-ok" class="toolbar-btn">Create</button>
        <button id="modal-cancel" class="toolbar-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
